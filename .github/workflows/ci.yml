name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26", "stable"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Test (race, shuffled)
        run: go test -race -shuffle=on ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4

  fuzz:
    name: fuzz smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Fuzz parser
        run: go test . -run=^$ -fuzz=FuzzParse -fuzztime=30s

      - name: Fuzz lexer
        run: go test ./lexer -run=^$ -fuzz=FuzzTokenize -fuzztime=30s
